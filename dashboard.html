<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কুইজ অ্যাডমিন ড্যাশবোর্ড</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f7f6; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input:focus, select:focus { border-color: #007bff; outline: none; }
        .options-container { background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px dashed #ccc; margin-bottom: 15px; }
        button { background-color: #28a745; color: white; padding: 12px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #218838; }
        .nav-link { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; }
        .nav-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <h2>নতুন কুইজ প্রশ্ন যোগ করুন</h2>
        
        <form id="quizForm">
            <!-- প্রশ্ন ইনপুট -->
            <div class="form-group">
                <label for="question">প্রশ্ন (Question):</label>
                <input type="text" id="question" placeholder="যেমন: 'সন্ধি' শব্দের অর্থ কী?" required>
            </div>

            <!-- অপশনসমূহ -->
            <div class="options-container">
                <label>অপশনসমূহ (Options):</label>
                <div class="form-group">
                    <input type="text" id="option0" placeholder="অপশন ১ (ইন্ডেক্স 0)" required>
                </div>
                <div class="form-group">
                    <input type="text" id="option1" placeholder="অপশন ২ (ইন্ডেক্স 1)" required>
                </div>
                <div class="form-group">
                    <input type="text" id="option2" placeholder="অপশন ৩ (ইন্ডেক্স 2)" required>
                </div>
                <div class="form-group">
                    <input type="text" id="option3" placeholder="অপশন ৪ (ইন্ডেক্স 3)" required>
                </div>
            </div>

            <!-- সঠিক উত্তরের ইনডেক্স সিলেক্ট করার ড্রপডাউন -->
            <div class="form-group">
                <label for="answer">সঠি উত্তরের ইনডেক্স (Correct Answer Index):</label>
                <select id="answer" required>
                    <option value="" disabled selected>সঠিক অপশনটি সিলেক্ট করুন</option>
                    <option value="0">অপশন ১ (ইন্ডেক্স 0)</option>
                    <option value="1">অপশন ২ (ইন্ডেক্স 1)</option>
                    <option value="2">অপশন ৩ (ইন্ডেক্স 2)</option>
                    <option value="3">অপশন ৪ (ইন্ডেক্স 3)</option>
                </select>
            </div>

            <button type="submit">ডাটাবেসে সাবমিট করুন</button>
        </form>

        <a class="nav-link" href="index.html">← হোমপেজে ফিরে যান</a>
    </div>

    <script>
        document.getElementById('quizForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // আপনার ডাটাবেস স্কিমা (q, options, ans) অনুযায়ী অবজেক্ট তৈরি
            const questionData = {
                q: document.getElementById('question').value,
                options: [
                    document.getElementById('option0').value,
                    document.getElementById('option1').value,
                    document.getElementById('option2').value,
                    document.getElementById('option3').value
                ],
                ans: parseInt(document.getElementById('answer').value) // স্ট্রিং থেকে নাম্বারে কনভার্ট করা হলো
            };

            try {
                // আপনার লাইভ Render ব্যাকএন্ড ইউআরএল
                const response = await fetch('https://mosabber-quiz-app.onrender.com/api/questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(questionData)
                });

                const result = await response.json();
                
                if (result.success) {
                    alert('অভিনন্দন! প্রশ্নটি সফলভাবে ডাটাবেসে যোগ হয়েছে।');
                    document.getElementById('quizForm').reset(); // ফর্ম খালি করার জন্য
                } else {
                    alert('ভুল হয়েছে: ' + (result.error || 'Unknown Error'));
                }
            } catch (error) {
                alert('সার্ভারে কানেক্ট করা যাচ্ছে না! ব্যাকএন্ড সচল আছে কিনা চেক করুন।');
                console.error(error);
            }
        });
    </script>
</body>
</html>
