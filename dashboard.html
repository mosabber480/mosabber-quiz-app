<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডাইনামিক কুইজ ড্যাশবোর্ড</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; background-color: #f4f7f6; max-width: 800px; margin: 0 auto; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* প্রতিটি MCQ ব্লকের স্টাইল */
        .mcq-block { background: #f9f9f9; padding: 20px; border-radius: 6px; border-left: 5px solid #007bff; margin-bottom: 20px; position: relative; }
        .mcq-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #007bff; }
        
        /* বাটন স্টাইল */
        .btn { padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-add { background-color: #007bff; color: white; margin-bottom: 20px; width: 100%; }
        .btn-add:hover { background-color: #0056b3; }
        .btn-submit { background-color: #28a745; color: white; width: 100%; }
        .btn-submit:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; color: white; position: absolute; top: 15px; right: 15px; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>ডাইনামিক কুইজ বিল্ডার (DNS রেকর্ডের মতো)</h2>
        <p style="text-align: center; color: #666;">প্রথমে টপিক সিলেক্ট করুন, তারপর যতখুশি প্রশ্ন যোগ করে এক ক্লিকে সাবমিট দিন।</p>
        
        <div class="form-group">
            <label>টপিক / মডিউল সিলেক্ট করুন:</label>
            <select id="mainCategory" required>
                <option value="5.সন্ধি-বিচ্ছেদ">৫. সন্ধি-বিচ্ছেদ</option>
                <option value="2.ধ্বনি-ও-বর্ণ">২. ধ্বনি ও বর্ণ</option>
                <option value="1.ভাষা">১. ভাষা</option>
            </select>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <!-- এখানে প্রশ্নগুলো একটার পর একটা জমা হবে -->
        <form id="masterQuizForm">
            <div id="mcqContainer">
                <!-- প্রথম MCQ ফিল্ড (ডিফল্ট) -->
            </div>

            <!-- DNS স্টাইলের 'Add More' বাটন -->
            <button type="button" class="btn btn-add" onclick="addMCQField()">➕ Add More MCQ</button>
            
            <!-- ফাইনাল সাবমিট বাটন -->
            <button type="submit" class="btn btn-submit">🚀 Submit All Questions</button>
        </form>
    </div>

    <script>
        let mcqCount = 0;
        const API_URL = 'https://mosabber-quiz-app.onrender.com/api/questions';

        // নতুন MCQ ইনপুট ব্লক তৈরি করার ফাংশন
        function addMCQField() {
            mcqCount++;
            const container = document.getElementById('mcqContainer');
            
            const mcqBlock = document.createElement('div');
            mcqBlock.className = 'mcq-block';
            mcqBlock.id = `mcq-block-${mcqCount}`;
            
            mcqBlock.innerHTML = `
                <div class="mcq-title">MCQ #${mcqCount}</div>
                ${mcqCount > 1 ? `<button type="button" class="btn btn-danger" onclick="removeMCQField(${mcqCount})">Remove</button>` : ''}
                
                <div class="form-group">
                    <label>প্রশ্ন:</label>
                    <input type="text" class="q-input" placeholder="যেমন: 'সন্ধি' শব্দের অর্থ কী?" required>
                </div>
                
                <div class="form-group"><input type="text" class="opt-0" placeholder="অপশন ১ (ইনডেক্স 0)" required></div>
                <div class="form-group"><input type="text" class="opt-1" placeholder="অপশন ২ (ইনডেক্স 1)" required></div>
                <div class="form-group"><input type="text" class="opt-2" placeholder="অপশন ৩ (ইনডেক্স 2)" required></div>
                <div class="form-group"><input type="text" class="opt-3" placeholder="অপশন ৪ (ইনডেক্স 3)" required></div>
                
                <div class="form-group">
                    <label>সঠি উত্তরের ইনডেক্স:</label>
                    <select class="ans-input" required>
                        <option value="0">অপশন ১ (ইনডেক্স 0)</option>
                        <option value="1">অপশন ২ (ইনডেক্স 1)</option>
                        <option value="2">অপশন ৩ (ইনডেক্স 2)</option>
                        <option value="3">অপশন ৪ (ইনডেক্স 3)</option>
                    </select>
                </div>
            `;
            
            container.appendChild(mcqBlock);
        }

        // কোনো ব্লক ভুল করে ফেললে ডিলিট করার ফাংশন
        function removeMCQField(id) {
            const block = document.getElementById(`mcq-block-${id}`);
            if(block) block.remove();
        }

        // পেজ লোড হলে স্বয়ংক্রিয়ভাবে প্রথম ফিল্ডটি দেখাবে
        window.onload = function() {
            addMCQField();
        };

        // ফর্ম সাবমিট লজিক (সবগুলো প্রশ্ন লুপ চালিয়ে ব্যাকএন্ডে পাঠানো)
        document.getElementById('masterQuizForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const category = document.getElementById('mainCategory').value;
            const mcqBlocks = document.querySelectorAll('.mcq-block');
            
            let successCount = 0;
            let hasError = false;

            // বাটনের টেক্সট পরিবর্তন (লোডিং স্টেট)
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.innerText = "ডাটা সেভ হচ্ছে... দয়া করে অপেক্ষা করুন...";
            submitBtn.disabled = true;

            // প্রতিটি ব্লকের ডাটা আলাদা করে নিয়ে ব্যাকএন্ডে পাঠানো
            for (let block of mcqBlocks) {
                const questionData = {
                    q: block.querySelector('.q-input').value,
                    options: [
                        block.querySelector('.opt-0').value,
                        block.querySelector('.opt-1').value,
                        block.querySelector('.opt-2').value,
                        block.querySelector('.opt-3').value
                    ],
                    ans: parseInt(block.querySelector('.ans-input').value),
                    category: category
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(questionData)
                    });
                    const result = await response.json();
                    if (result.success) {
                        successCount++;
                    } else {
                        hasError = true;
                    }
                } catch (error) {
                    hasError = true;
                }
            }

            // সাবমিট শেষে রেজাল্ট দেখানো
            submitBtn.innerText = "🚀 Submit All Questions";
            submitBtn.disabled = false;

            if (!hasError) {
                alert(`অভিনন্দন! মোট ${successCount}টি প্রশ্ন সফলভাবে ডাটাবেসে যোগ হয়েছে।`);
                document.getElementById('mcqContainer').innerHTML = "";
                mcqCount = 0;
                addMCQField(); // ফর্ম রিসেট করে আবার ১ম ফিল্ড আনা
            } else {
                alert(`কিছু প্রশ্ন যোগ হয়েছে (${successCount}টি), তবে নেটওয়ার্ক বা সার্ভার সমস্যার কারণে কিছু প্রশ্ন মিস হতে পারে। অনুগ্রহ করে চেক করুন।`);
            }
        });
    </script>
</body>
</html>
