<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Developing - Dynamic Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .score-board {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        /* Sub-header Container: Left and Right Alignment */
        .header-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .exam-path {
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
        }
        .negative-mark-note {
            color: #e74c3c;
            font-size: 13px;
            font-weight: 600;
            text-align: right;
        }

        .question-block {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ccc;
        }
        .question-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
            text-align: left;
        }
        
        .options-container {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
        }
        .option-btn {
            background: #f8f9fa;
            border: 1px solid #ced4da;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s ease;
        }
        
        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { padding: 20px; }
            h1, h2 { font-size: 20px; }
            .score-board {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 15px;
            }
            .header-info-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .negative-mark-note {
                text-align: left;
            }
            .options-container {
                flex-direction: column;
                gap: 10px;
            }
            .option-btn {
                width: 100%;
                box-sizing: border-box;
                padding: 12px 15px;
            }
        }

        .option-btn:hover:not(.disabled) {
            background: #e2e6ea;
            border-color: #dae0e5;
        }
        .option-btn.disabled {
            cursor: not-allowed;
        }
        .correct {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }
        .answer-text {
            font-weight: bold;
            color: #27ae60;
            margin-top: 10px;
            display: none;
            text-align: left;
        }
        .explanation-text {
            font-size: 14px;
            color: #555;
            margin-top: 5px;
            display: none;
            background: #f9f9f9;
            padding: 8px 12px;
            border-left: 3px solid #17a2b8;
            border-radius: 4px;
        }
        .result-section {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
        }
        .detailed-stats {
            font-size: 14px;
            margin-bottom: 12px;
            color: #555;
        }
        .correct-count { color: #2ecc71; font-weight: bold; }
        .incorrect-count { color: #e74c3c; font-weight: bold; }
        #final-score {
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
            border-top: 2px solid #bdc3c7;
            padding-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="score-board">স্কোর: <span id="live-score">0</span></div>

<div class="container">
    <a href="index.html" class="btn-back">⬅️ হোম পেজে ফিরে যান</a>
    
    <h1 id="main-title">Custom Developing</h1>
    <h2 id="topic-title">টপিক লোড হচ্ছে...</h2>
    
    <!-- Dynamic Category Path with Icon (Left Side) & Negative Marking Notice (Right Side) -->
    <div class="header-info-bar">
        <div id="category-path" class="exam-path"></div>
        <div class="negative-mark-note">[ প্রতিটি ভুল উত্তরের জন্য ০.৫ নম্বর কাটা যাবে ]</div>
    </div>
    
    <hr style="margin-top: 8px; border: 0; border-top: 1px solid #ccc;"><br>

    <div id="quiz-wrapper">
        <p style="text-align:center; color:#888;">ডাটাবেজ থেকে প্রশ্ন লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</p>
    </div>

    <div class="result-section">
        <h2>পরীক্ষার ফলাফল</h2>
        <div class="detailed-stats">
            সঠিক উত্তর: <span id="correct-count-display" class="correct-count">০</span> টি &nbsp;&nbsp;|&nbsp;&nbsp; ভুল উত্তর: <span id="incorrect-count-display" class="incorrect-count">০</span> টি
        </div>
        <div id="final-score">আপনার মোট প্রাপ্ত স্কোর: ০</div>
    </div>
</div>

<script>
    // URL Parameters থেকে Category সংগ্রহ করা
    const urlParams = new URLSearchParams(window.location.search);
    const currentCategory = urlParams.get('category');

    // Render Live API URL
    const API_URL = currentCategory 
        ? `https://mosabber-quiz-app.onrender.com/api/questions?category=${encodeURIComponent(currentCategory)}`
        : null;

    let quizData = [];
    let score = 0;
    let correctCount = 0;
    let incorrectCount = 0;

    const quizWrapper = document.getElementById('quiz-wrapper');
    const liveScoreDisplay = document.getElementById('live-score');
    const correctCountDisplay = document.getElementById('correct-count-display');
    const incorrectCountDisplay = document.getElementById('incorrect-count-display');
    const finalScoreDisplay = document.getElementById('final-score');

    // Bangla Choice Letter Mapping
    function getBanglaLetter(index) {
        const letters = ['ক', 'খ', 'গ', 'ঘ'];
        return letters[index] || index;
    }

    async function fetchQuestionsFromDB() {
        const topicTitle = document.getElementById('topic-title');
        const categoryPath = document.getElementById('category-path');

        if (!currentCategory) {
            topicTitle.innerText = "কোনো ক্যাটাগরি সিলেক্ট করা হয়নি!";
            quizWrapper.innerHTML = "<p style='text-align:center; color:red;'>অনুগ্রহ করে হোম পেজ থেকে একটি টপিক নির্বাচন করুন।</p>";
            return;
        }

        // Category Path ভাগ করে Title সেট করা (e.g. prili/bangla/shondhi)
        const parts = currentCategory.split('/');
        const mainCat = parts[0] || '';
        const subCat = parts[1] || '';
        const topic = parts[2] || subCat || mainCat;

        topicTitle.innerText = `টপিক: ${topic.replace(/-/g, ' ')}`;
        
        // 📁 আইকনসহ ক্যাটাগরি পাথ প্রদর্শন
        categoryPath.innerHTML = `📁 ${mainCat} &gt; ${subCat ? subCat + ' &gt; ' : ''}${topic}`;

        try {
            const res = await fetch(API_URL);
            quizData = await res.json();

            if (!quizData || quizData.length === 0) {
                quizWrapper.innerHTML = `<p style="text-align:center; color:#888;"><b>${topic}</b>-এর অধীনে কোনো প্রশ্ন পাওয়া যায়নি। ড্যাশবোর্ড থেকে প্রশ্ন যোগ করুন!</p>`;
                return;
            }

            renderQuizUI();
        } catch (err) {
            console.error("Fetch error:", err);
            quizWrapper.innerHTML = "<p style='text-align:center; color:red;'>সার্ভার/ডাটাবেজ থেকে প্রশ্ন লোড করতে ব্যর্থ হয়েছে!</p>";
        }
    }

    function renderQuizUI() {
        quizWrapper.innerHTML = "";

        quizData.forEach((item, qIndex) => {
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `${qIndex + 1}. ${item.q}`;
            qBlock.appendChild(qText);

            const optContainer = document.createElement('div');
            optContainer.className = 'options-container';

            item.options.forEach((opt, oIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                
                btn.onclick = () => handleAnswer(btn, qIndex, oIndex, optContainer);
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);

            // Correct Answer Indicator
            const ansText = document.createElement('div');
            ansText.className = 'answer-text';
            ansText.id = `ans-text-${qIndex}`;
            ansText.innerText = `সঠিক উত্তর: (${getBanglaLetter(item.ans)}) ${item.options[item.ans]}`;
            qBlock.appendChild(ansText);

            // Optional Explanation Display
            if (item.explanation && item.explanation.trim() !== '') {
                const expText = document.createElement('div');
                expText.className = 'explanation-text';
                expText.id = `exp-text-${qIndex}`;
                expText.innerText = `ব্যাখ্যা: ${item.explanation}`;
                qBlock.appendChild(expText);
            }

            quizWrapper.appendChild(qBlock);
        });
    }

    function handleAnswer(selectedBtn, qIndex, selectedIndex, optContainer) {
        const currentQuestion = quizData[qIndex];
        const allButtons = optContainer.querySelectorAll('.option-btn');
        
        allButtons.forEach(btn => {
            btn.classList.add('disabled');
            btn.onclick = null;
        });

        const correctBtn = allButtons[currentQuestion.ans];

        if (selectedIndex === currentQuestion.ans) {
            selectedBtn.classList.add('correct');
            score += 1;
            correctCount += 1;
        } else {
            selectedBtn.classList.add('incorrect');
            if (correctBtn) correctBtn.classList.add('correct');
            score -= 0.5; // Negative marking
            incorrectCount += 1;
        }

        liveScoreDisplay.innerText = score;
        correctCountDisplay.innerText = correctCount;
        incorrectCountDisplay.innerText = incorrectCount;
        finalScoreDisplay.innerText = `আপনার মোট প্রাপ্ত স্কোর: ${score}`;

        // Show Answer & Explanation
        const ansElem = document.getElementById(`ans-text-${qIndex}`);
        if (ansElem) ansElem.style.display = 'block';

        const expElem = document.getElementById(`exp-text-${qIndex}`);
        if (expElem) expElem.style.display = 'block';
    }

    window.onload = fetchQuestionsFromDB;
</script>

</body>
</html>
