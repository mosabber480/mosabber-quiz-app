<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - MCQ Platform</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 35px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0056b3; }
        .toggle-text {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }
        .toggle-link {
            color: #007bff;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .alert-danger { background-color: #f8d7da; color: #721c24; }
        .alert-success { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="formTitle">🔐 Login to Account</h2>
        
        <div id="alertBox" class="alert"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" id="loginEmail" placeholder="Enter your email..." required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" placeholder="Enter password..." required>
            </div>
            <button type="submit" class="btn" id="loginBtn">🚀 Login</button>
        </form>

        <!-- REGISTER FORM (Hidden by default) -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="regName" placeholder="Enter full name..." required>
            </div>
            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" id="regEmail" placeholder="Enter email address..." required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="regPassword" placeholder="Create a password..." required>
            </div>
            <button type="submit" class="btn" id="regBtn" style="background-color: #28a745;">✨ Register Account</button>
        </form>

        <div class="toggle-text" id="toggleMessage">
            Don't have an account? <span class="toggle-link" onclick="toggleForm('register')">Register Now</span>
        </div>
    </div>

    <script>
        const AUTH_API = 'https://mosabber-quiz-app.onrender.com/api/auth';

        function showAlert(msg, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.className = `alert ${isSuccess ? 'alert-success' : 'alert-danger'}`;
            alertBox.style.display = 'block';
        }

        function toggleForm(type) {
            document.getElementById('alertBox').style.display = 'none';
            if (type === 'register') {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('formTitle').innerText = '📝 Register Account';
                document.getElementById('toggleMessage').innerHTML = `Already have an account? <span class="toggle-link" onclick="toggleForm('login')">Login Here</span>`;
            } else {
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('formTitle').innerText = '🔐 Login to Account';
                document.getElementById('toggleMessage').innerHTML = `Don't have an account? <span class="toggle-link" onclick="toggleForm('register')">Register Now</span>`;
            }
        }

        // LOGIN SUBMIT
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${AUTH_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    // Save Token & User Info to LocalStorage
                    localStorage.setItem('quiz_token', data.token);
                    localStorage.setItem('quiz_user', JSON.stringify(data.user));

                    showAlert("✅ Login Successful! Redirecting...", true);
                    
                    setTimeout(() => {
                        if (data.user.role === 'owner' || data.user.role === 'admin') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'profile.html';
                        }
                    }, 1200);
                } else {
                    showAlert(data.message || "❌ Invalid login credentials!");
                }
            } catch (err) {
                showAlert("❌ Server connection error!");
            } finally {
                btn.innerText = "🚀 Login";
                btn.disabled = false;
            }
        });

        // REGISTER SUBMIT
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.innerText = "Creating Account...";
            btn.disabled = true;

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const res = await fetch(`${AUTH_API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    showAlert("🎉 Registration successful! Please login below.", true);
                    setTimeout(() => toggleForm('login'), 1500);
                } else {
                    showAlert(data.message || "❌ Registration failed!");
                }
            } catch (err) {
                showAlert("❌ Server connection error!");
            } finally {
                btn.innerText = "✨ Register Account";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
